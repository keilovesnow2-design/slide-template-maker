<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スライドテンプレートメーカー</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Meiryo", "Yu Gothic", sans-serif;
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #1e293b;
      border: 1px solid #028090;
      border-radius: 12px;
      padding: 2.5rem;
      width: 100%;
      max-width: 680px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .logo { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.5rem; }
    .logo-dot { width: 12px; height: 12px; background: #02C39A; border-radius: 50%; }
    .badge {
      background: #028090; color: #fff; font-size: 11px; font-weight: bold;
      padding: 2px 10px; border-radius: 20px; letter-spacing: 0.05em;
    }

    h1 { font-size: 1.6rem; font-weight: bold; color: #f8fafc; margin-bottom: 0.4rem; }
    .subtitle { font-size: 0.85rem; color: #94a3b8; margin-bottom: 2rem; }

    .field { margin-bottom: 1.4rem; }

    .field-label {
      display: block; font-size: 0.82rem; font-weight: bold;
      color: #02C39A; margin-bottom: 0.5rem; letter-spacing: 0.03em;
    }
    .field-label .required { color: #f87171; margin-left: 4px; }

    input[type="text"] {
      width: 100%; background: #0f172a; border: 1px solid #334155;
      border-radius: 6px; color: #f8fafc; font-family: inherit;
      font-size: 0.95rem; padding: 0.65rem 0.9rem; outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus {
      border-color: #028090;
      box-shadow: 0 0 0 2px rgba(2,128,144,0.25);
    }
    input::placeholder { color: #475569; }
    .hint { font-size: 0.75rem; color: #64748b; margin-top: 0.3rem; }

    /* ── 色パターン ── */
    .color-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.55rem;
    }

    .color-card {
      cursor: pointer;
      border: 2px solid #334155;
      border-radius: 8px;
      padding: 0.55rem 0.4rem 0.45rem;
      text-align: center;
      transition: border-color 0.2s, background 0.2s;
      user-select: none;
    }
    .color-card input[type="radio"] { display: none; }
    .color-card:has(input:checked) {
      border-color: #02C39A;
      background: rgba(2,195,154,0.08);
    }
    .color-card:hover:not(:has(input:checked)) { border-color: #475569; }

    .swatch { border-radius: 4px; overflow: hidden; margin-bottom: 0.35rem; border: 1px solid #334155; }
    .swatch-top { height: 22px; }
    .swatch-bot { height: 14px; }

    .color-name {
      font-size: 0.68rem; color: #94a3b8; line-height: 1.3;
      display: block;
    }

    /* ── スライドタイプ ── */
    .type-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.55rem;
    }

    .type-card {
      cursor: pointer;
      border: 2px solid #334155;
      border-radius: 8px;
      padding: 0.65rem 0.4rem;
      text-align: center;
      transition: border-color 0.2s, background 0.2s;
      user-select: none;
    }
    .type-card input[type="radio"] { display: none; }
    .type-card:has(input:checked) {
      border-color: #02C39A;
      background: rgba(2,195,154,0.08);
    }
    .type-card:hover:not(.type-disabled):not(:has(input:checked)) { border-color: #475569; }

    .type-card.type-disabled {
      opacity: 0.38;
      cursor: not-allowed;
    }

    .type-icon { display: block; font-size: 1.4rem; margin-bottom: 0.3rem; }
    .type-name { font-size: 0.75rem; color: #e2e8f0; font-weight: bold; display: block; }
    .type-soon {
      display: inline-block; font-size: 0.6rem; color: #64748b;
      background: #1e293b; border: 1px solid #334155;
      border-radius: 10px; padding: 1px 6px; margin-top: 0.25rem;
    }

    .divider { border: none; border-top: 1px solid #1e3a4a; margin: 1.5rem 0; }

    button {
      width: 100%; padding: 0.85rem;
      background: #028090; color: #fff;
      font-family: inherit; font-size: 1rem; font-weight: bold;
      border: none; border-radius: 8px; cursor: pointer;
      letter-spacing: 0.04em; transition: background 0.2s, transform 0.1s;
    }
    button:hover:not(:disabled) { background: #026f7d; }
    button:active:not(:disabled) { transform: scale(0.98); }
    button:disabled { background: #334155; color: #64748b; cursor: not-allowed; }

    .status {
      margin-top: 1rem; padding: 0.7rem 1rem;
      border-radius: 6px; font-size: 0.88rem; display: none;
    }
    .status.loading { display: block; background: #1e3a4a; color: #02C39A; border: 1px solid #028090; }
    .status.error   { display: block; background: #3b1a1a; color: #f87171; border: 1px solid #7f1d1d; }
    .status.success { display: block; background: #0d2a1f; color: #4ade80; border: 1px solid #166534; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-dot"></div>
      <span class="badge">スライドテンプレートメーカー</span>
    </div>
    <h1>スライドメーカー</h1>
    <p class="subtitle">テーマを入力して色・タイプを選ぶだけで高品質な PowerPoint を自動生成します</p>

    <form id="form">

      <!-- テーマ -->
      <div class="field">
        <span class="field-label">テーマ <span class="required">*</span></span>
        <input type="text" id="themeInput" required
               placeholder="例: プロンプトエンジニアリング" maxlength="30">
        <p class="hint">スライドのメインタイトルになります（30文字以内推奨）</p>
      </div>

      <!-- サブタイトル -->
      <div class="field">
        <span class="field-label">サブタイトル</span>
        <input type="text" id="subtitleInput"
               placeholder="例: 〜AIを使いこなす実践テクニック〜" maxlength="40">
        <p class="hint">表紙に小さく表示されます（省略可）</p>
      </div>

      <!-- 色パターン -->
      <div class="field">
        <span class="field-label">色パターン <span class="required">*</span></span>
        <div class="color-grid">

          <label class="color-card">
            <input type="radio" name="colorTheme" value="teal-navy" checked>
            <div class="swatch">
              <div class="swatch-top" style="background:#028090"></div>
              <div class="swatch-bot" style="background:#1A1A2E"></div>
            </div>
            <span class="color-name">ティール<br>× ネイビー</span>
          </label>

          <label class="color-card">
            <input type="radio" name="colorTheme" value="blue-white">
            <div class="swatch">
              <div class="swatch-top" style="background:#1565C0"></div>
              <div class="swatch-bot" style="background:#F0F7FF"></div>
            </div>
            <span class="color-name">ブルー<br>× ホワイト</span>
          </label>

          <label class="color-card">
            <input type="radio" name="colorTheme" value="orange-dark">
            <div class="swatch">
              <div class="swatch-top" style="background:#E65100"></div>
              <div class="swatch-bot" style="background:#1C1C1C"></div>
            </div>
            <span class="color-name">オレンジ<br>× ダーク</span>
          </label>

          <label class="color-card">
            <input type="radio" name="colorTheme" value="pink-beige">
            <div class="swatch">
              <div class="swatch-top" style="background:#C2185B"></div>
              <div class="swatch-bot" style="background:#F5E6D3"></div>
            </div>
            <span class="color-name">ピンク<br>× ベージュ</span>
          </label>

          <label class="color-card">
            <input type="radio" name="colorTheme" value="mono-gold">
            <div class="swatch">
              <div class="swatch-top" style="background:#212121"></div>
              <div class="swatch-bot" style="background:#B8860B"></div>
            </div>
            <span class="color-name">モノトーン<br>× ゴールド</span>
          </label>

        </div>
      </div>

      <!-- スライドタイプ -->
      <div class="field">
        <span class="field-label">スライドタイプ <span class="required">*</span></span>
        <div class="type-grid">

          <label class="type-card">
            <input type="radio" name="template" value="lecture" checked>
            <span class="type-icon">📚</span>
            <span class="type-name">講義資料</span>
          </label>

          <label class="type-card">
            <input type="radio" name="template" value="product-intro">
            <span class="type-icon">📦</span>
            <span class="type-name">商品紹介</span>
          </label>

          <label class="type-card type-disabled">
            <input type="radio" name="template" value="seminar" disabled>
            <span class="type-icon">🎤</span>
            <span class="type-name">セミナー資料</span>
            <span class="type-soon">近日追加</span>
          </label>

          <label class="type-card type-disabled">
            <input type="radio" name="template" value="business-proposal" disabled>
            <span class="type-icon">💼</span>
            <span class="type-name">事業提案</span>
            <span class="type-soon">近日追加</span>
          </label>

          <label class="type-card type-disabled">
            <input type="radio" name="template" value="progress-report" disabled>
            <span class="type-icon">📊</span>
            <span class="type-name">進捗報告</span>
            <span class="type-soon">近日追加</span>
          </label>

        </div>
      </div>

      <hr class="divider">

      <button type="submit" id="btn">▶ スライドを生成してダウンロード</button>
      <div class="status" id="status"></div>
    </form>
  </div>

  <!-- pptxgenjs CDN（ブラウザ版） -->
  <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@4.0.1/dist/pptxgen.bundle.js"></script>
  <!-- テーマ・テンプレート定義 -->
  <script src="lib/color-themes.js"></script>
  <script src="lib/lecture-template.js"></script>
  <script src="lib/product-intro-template.js"></script>

  <script>
    const form   = document.getElementById("form");
    const btn    = document.getElementById("btn");
    const status = document.getElementById("status");

    function setStatus(type, msg) {
      status.className = "status " + type;
      status.textContent = msg;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const theme    = document.getElementById("themeInput").value.trim();
      const subtitle = document.getElementById("subtitleInput").value.trim();
      const colorTheme = document.querySelector('[name="colorTheme"]:checked').value;
      const template   = document.querySelector('[name="template"]:checked').value;

      if (!theme) return;

      btn.disabled = true;
      btn.textContent = "⏳ 生成中...";
      setStatus("loading", "スライドを生成しています。しばらくお待ちください...");

      try {
        let pres;
        if (template === "lecture") {
          pres = buildLecture({ theme, subtitle, slideCount: 5, colorTheme });
        } else if (template === "product-intro") {
          pres = buildProductIntro({ theme, subtitle, slideCount: 5, colorTheme });
        } else {
          throw new Error("このテンプレートは近日追加予定です");
        }

        await pres.writeFile({ fileName: `${theme}-slide.pptx` });
        setStatus("success", `✅ "${theme}-slide.pptx" のダウンロードを開始しました`);
      } catch (err) {
        setStatus("error", "❌ エラー: " + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = "▶ スライドを生成してダウンロード";
      }
    });
  </script>
</body>
</html>
